<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเข้าสู่ระบบ / สมัครสมาชิก</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        input:focus {
            border-color: #007bff;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button:hover {
            background: #0056b3;
        }

        .switch-text {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }

        .switch-text a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }

        .switch-text a:hover {
            text-decoration: underline;
        }

        /* ซ่อนหน้าจอเริ่มต้น */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-box">
            <h2>เข้าสู่ระบบ</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">ชื่อผู้ใช้</label>
                    <input type="text" id="login-username" required placeholder="กรอกชื่อผู้ใช้">
                </div>
                <div class="form-group">
                    <label for="login-password">รหัสผ่าน</label>
                    <input type="password" id="login-password" required placeholder="กรอกรหัสผ่าน">
                </div>
                <button type="submit">เข้าสู่ระบบ</button>
            </form>
            <div class="switch-text">
                ยังไม่มีบัญชีใช่ไหม? <a href="#" id="to-register">สร้างบัญชีผู้ใช้</a>
            </div>
        </div>

        <div id="register-box" class="hidden">
            <h2>สร้างบัญชีผู้ใช้ใหม่</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-username">ชื่อผู้ใช้</label>
                    <input type="text" id="reg-username" required placeholder="ตั้งชื่อผู้ใช้">
                </div>
                <div class="form-group">
                    <label for="reg-password">รหัสผ่าน (อย่างน้อย 8 ตัวอักษร)</label>
                    <input type="password" id="reg-password" minlength="8" required placeholder="ตั้งรหัสผ่าน">
                </div>
                <button type="submit">สมัครสมาชิก</button>
            </form>
            <div class="switch-text">
                มีบัญชีอยู่แล้ว? <a href="#" id="to-login">เข้าสู่ระบบที่นี่</a>
            </div>
        </div>
    </div>

    <script>
        // ดึง Element ต่างๆ มาใช้งาน
        const loginBox = document.getElementById('login-box');
        const registerBox = document.getElementById('register-box');
        
        const toRegisterLink = document.getElementById('to-register');
        const toLoginLink = document.getElementById('to-login');

        // สลับไปหน้าสมัครสมาชิก
        toRegisterLink.addEventListener('click', (e) => {
            e.preventDefault();
            loginBox.classList.add('hidden');
            registerBox.classList.remove('hidden');
        });

        // สลับกลับมาหน้าเข้าสู่ระบบ
        toLoginLink.addEventListener('click', (e) => {
            e.preventDefault();
            registerBox.classList.add('hidden');
            loginBox.classList.remove('hidden');
        });

        // จำลองระบบบันทึกข้อมูล (ใช้ LocalStorage ของเบราว์เซอร์)
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;

            // บันทึกข้อมูลลงเบราว์เซอร์
            localStorage.setItem('user_' + username, password);
            
            alert('สร้างบัญชีผู้ใช้สำเร็จแล้ว! ระบบจะพากลับไปหน้าเข้าสู่ระบบ');
            
            // รีเซ็ตฟอร์มแล้วสลับหน้ากลับไปล็อกอิน
            document.getElementById('register-form').reset();
            registerBox.classList.add('hidden');
            loginBox.classList.remove('hidden');
        });

        // ระบบตรวจสอบตอนเข้าสู่ระบบ
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            // ดึงรหัสผ่านที่เคยบันทึกไว้มาเช็ค
            const savedPassword = localStorage.getItem('user_' + username);

            if (savedPassword && savedPassword === password) {
                alert('ยินดีต้อนรับเข้าสู่ระบบสำเร็จ!');
            } else {
                alert('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง หรือยังไม่ได้สมัครสมาชิก');
            }
        });
    </script>
</body>
</html>
