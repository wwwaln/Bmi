<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health & Nutrition Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .page { width: 100%; max-width: 450px; background: white; min-height: 100vh; padding: 20px; box-sizing: border-box; display: none; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .active { display: block; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #ddd; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="page-login" class="page active">
    <h2>เข้าสู่ระบบ</h2>
    <input type="text" id="login-user" placeholder="ชื่อผู้ใช้">
    <input type="password" id="login-pass" placeholder="รหัสผ่าน">
    <button onclick="login()">เข้าสู่ระบบ</button>
    <p onclick="navigate('page-register')">ยังไม่มีบัญชี? สมัครสมาชิก</p>
</div>

<div id="page-register" class="page">
    <h2>สมัครสมาชิก</h2>
    <input type="text" id="reg-user" placeholder="ตั้งชื่อผู้ใช้">
    <input type="password" id="reg-pass" placeholder="ตั้งรหัสผ่าน">
    <button onclick="register()">ยืนยันการสมัคร</button>
    <p onclick="navigate('page-login')">มีบัญชีแล้ว? กลับไปหน้าเข้าสู่ระบบ</p>
</div>

<div id="page-dash" class="page">
    <h2>บันทึกข้อมูล BMI</h2>
    <input type="number" id="weight" placeholder="น้ำหนัก (กก.)">
    <input type="number" id="height" placeholder="ส่วนสูง (ซม.)">
    <button onclick="saveBMI()">คำนวณและบันทึก</button>
    <canvas id="bmiChart"></canvas>
</div>

<div id="page-nutrition" class="page">
    <h2>เมนูโภชนาการ</h2>
    <canvas id="nutrChart"></canvas>
    <div id="advice"></div>
</div>

<div id="page-profile" class="page">
    <h2>การตั้งค่าโปรไฟล์</h2>
    <img id="profile-pic" src="https://via.placeholder.com/100" style="border-radius:50%">
    <input type="file" onchange="loadPic(this)">
    <input type="text" id="nickname" placeholder="ชื่อเล่น">
    <button onclick="saveProfile()">บันทึกโปรไฟล์</button>
    <button onclick="logout()" style="background:red">ออกจากระบบ</button>
</div>

<div id="nav-bar" class="nav-bottom" style="display:none;">
    <button onclick="navigate('page-dash')">Dashboard</button>
    <button onclick="navigate('page-nutrition')">อาหาร</button>
    <button onclick="navigate('page-profile')">ตั้งค่า</button>
</div>

<script>
    function navigate(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function login() {
        // ตรวจสอบการ Login จริงในระบบ
        document.getElementById('nav-bar').style.display = 'flex';
        navigate('page-dash');
    }

    function register() {
        alert("สมัครสมาชิกสำเร็จ!");
        navigate('page-login');
    }

    function logout() {
        document.getElementById('nav-bar').style.display = 'none';
        navigate('page-login');
    }

    function saveBMI() {
        alert("บันทึกข้อมูลแล้ว!");
        navigate('page-nutrition');
    }

    function loadPic(input) {
        const reader = new FileReader();
        reader.onload = e => document.getElementById('profile-pic').src = e.target.result;
        reader.readAsDataURL(input.files[0]);
    }
</script>
</body>
</html>
