<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเข้าสู่ระบบและสมัครสมาชิก</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #333;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #666;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: #007bff;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #0056b3;
        }

        .toggle-text {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #666;
        }

        .toggle-text a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        /* ซ่อนฟอร์มที่ไม่ได้เลือก */
        .hidden {
            display: none;
        }

        .error-msg {
            color: red;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. ฟอร์มเข้าสู่ระบบ (Login) -->
    <div id="login-form">
        <h2>เข้าสู่ระบบ</h2>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="login-username">ชื่อผู้ใช้งาน</label>
                <input type="text" id="login-username" required placeholder="ใส่ชื่อผู้ใช้งาน">
            </div>
            <div class="form-group">
                <label for="login-password">รหัสผ่าน</label>
                <input type="password" id="login-password" required placeholder="ใส่รหัสผ่าน">
            </div>
            <button type="submit">เข้าสู่ระบบ</button>
        </form>
        <div class="toggle-text">
            ยังไม่มีบัญชีใช่ไหม? <a href="#" onclick="toggleForm('signup')">สร้างแอคเคานต์ที่นี่</a>
        </div>
    </div>

    <!-- 2. ฟอร์มสร้างบัญชีใหม่ (Sign Up) -->
    <div id="signup-form" class="hidden">
        <h2>สร้างแอคเคานต์</h2>
        <form onsubmit="handleSignUp(event)">
            <div class="form-group">
                <label for="signup-username">ตั้งชื่อผู้ใช้งาน</label>
                <input type="text" id="signup-username" required placeholder="อย่างน้อย 3 ตัวอักษร">
            </div>
            <div class="form-group">
                <label for="signup-password">ตั้งรหัสผ่าน</label>
                <input type="password" id="signup-password" required placeholder="ต้องมีอย่างน้อย 8 ตัว">
                <div id="password-error" class="error-msg">รหัสผ่านต้องมีความยาวอย่างน้อย 8 ตัวอักษร!</div>
            </div>
            <button type="submit">ยืนยันการสมัครสมาชิก</button>
        </form>
        <div class="toggle-text">
            มีบัญชีอยู่แล้ว? <a href="#" onclick="toggleForm('login')">เข้าสู่ระบบที่นี่</a>
        </div>
    </div>
</div>

<script>
    // ฟังก์ชันสลับหน้าจอระหว่าง เข้าสู่ระบบ กับ สมัครสมาชิก
    function toggleForm(formType) {
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        
        if (formType === 'signup') {
            loginForm.classList.add('hidden');
            signupForm.classList.remove('hidden');
        } else {
            signupForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
        }
    }

    // ฟังก์ชันเมื่อกดปุ่ม "ยืนยันการสมัครสมาชิก"
    function handleSignUp(event) {
        event.preventDefault(); // ป้องกันหน้าเว็บโหลดใหม่
        
        const username = document.getElementById('signup-username').value;
        const password = document.getElementById('signup-password').value;
        const errorMsg = document.getElementById('password-error');

        // ตรวจสอบเงื่อนไขรหัสผ่าน 8 ตัว
        if (password.length < 8) {
            errorMsg.style.display = 'block';
            return;
        } else {
            errorMsg.style.display = 'none';
        }

        // ยิงยืนยันผ่าน (จำลองการสมัครสำเร็จ)
        alert(`🎉 สมัครสมาชิกสำเร็จ!\nยินดีต้อนรับคุณ: ${username}\nระบบได้ทำการบันทึกข้อมูลเรียบร้อยแล้ว`);
        
        // เมื่อสมัครเสร็จ ให้เด้งกลับไปหน้าล็อกอินอัตโนมัติ
        toggleForm('login');
    }

    // ฟังก์ชันเมื่อกดปุ่ม "เข้าสู่ระบบ"
    function handleLogin(event) {
        event.preventDefault();
        const username = document.getElementById('login-username').value;
        
        alert(`🔓 เข้าสู่ระบบสำเร็จ!\nยินดีต้อนรับกลับมาครับ คุณ ${username}`);
    }
</script>

</body>
</html>
