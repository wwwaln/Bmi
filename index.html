<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health & Nutrition Professional System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #f7f9fc; --card: #ffffff; }
        body { background-color: var(--bg); font-family: 'Kanit', sans-serif; display: flex; justify-content: center; min-height: 100vh; margin: 0; padding-bottom: 100px; }
        .main-container { width: 100%; max-width: 450px; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { color: #333; text-align: center; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #e1e8ed; border-radius: 12px; font-size: 16px; outline: none; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .nav-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 15px; border-radius: 50px; display: flex; justify-content: space-around; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .nav-item { border: none; background: none; font-weight: bold; color: #888; }
        .nav-item.active { color: var(--primary); }
        #avatar-preview { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 15px; display: block; object-fit: cover; border: 4px solid var(--primary); }
    </style>
</head>
<body>

<div class="main-container">
    <div id="auth-page" class="card">
        <h2 id="auth-title">เข้าสู่ระบบ</h2>
        <input type="text" id="username" placeholder="ชื่อผู้ใช้">
        <input type="password" id="password" placeholder="รหัสผ่าน">
        <button onclick="handleAuth()">ตกลง</button>
        <p style="text-align:center; font-size: 14px; cursor: pointer;" onclick="toggleAuthMode()">เปลี่ยนเป็น สมัครสมาชิก/เข้าสู่ระบบ</p>
    </div>

    <div id="dash-page" class="card hidden">
        <h2>บันทึกข้อมูลสุขภาพ</h2>
        <input type="number" id="weight" placeholder="น้ำหนัก (กก.)">
        <input type="number" id="height" placeholder="ส่วนสูง (ซม.)">
        <input type="number" id="year" placeholder="ปีเกิด (ค.ศ.)">
        <select id="gender"><option>ชาย</option><option>หญิง</option></select>
        <button onclick="saveData()">คำนวณและดูเมนู</button>
        <canvas id="bmiChart" style="margin-top:20px;"></canvas>
    </div>

    <div id="nutr-page" class="card hidden">
        <h2>โภชนาการแนะนำ</h2>
        <canvas id="pieChart"></canvas>
        <div id="advice-content" style="margin-top:20px; line-height: 1.6;"></div>
    </div>

    <div id="prof-page" class="card hidden">
        <h2>โปรไฟล์</h2>
        <img id="avatar-preview" src="https://via.placeholder.com/150">
        <input type="file" onchange="previewImage(this)">
        <input type="text" id="nickname" placeholder="ชื่อเล่นของคุณ">
        <button onclick="saveProfile()">บันทึกโปรไฟล์</button>
        <button onclick="logout()" style="background:#ff4d4d;">ออกจากระบบ</button>
    </div>
</div>

<nav class="nav-bar hidden" id="nav-bar">
    <button class="nav-item" onclick="switchPage('dash-page')">บันทึก</button>
    <button class="nav-item" onclick="switchPage('nutr-page')">เมนู</button>
    <button class="nav-item" onclick="switchPage('prof-page')">โปรไฟล์</button>
</nav>

<script>
    let userData = { history: [], profile: {} };

    // ฟังก์ชันจัดการหน้าจอ
    function switchPage(pageId) {
        ['auth-page', 'dash-page', 'nutr-page', 'prof-page'].forEach(p => document.getElementById(p).classList.add('hidden'));
        document.getElementById(pageId).classList.remove('hidden');
        if(pageId === 'nutr-page') renderNutrition();
    }

    function handleAuth() {
        // จำลองการล็อกอิน
        document.getElementById('auth-page').classList.add('hidden');
        document.getElementById('nav-bar').classList.remove('hidden');
        switchPage('dash-page');
    }

    function saveData() {
        const w = document.getElementById('weight').value;
        const h = document.getElementById('height').value / 100;
        const bmi = (w / (h * h)).toFixed(1);
        userData.history.push({ date: new Date().toLocaleDateString(), bmi: bmi });
        alert("บันทึกข้อมูลเรียบร้อย!");
        switchPage('nutr-page');
    }

    function renderNutrition() {
        const ctx = document.getElementById('pieChart').getContext('2d');
        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['คาร์โบไฮเดรต 50%', 'โปรตีน 25%', 'ไขมัน 25%'],
                datasets: [{ data: [50, 25, 25], backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56'] }]
            }
        });
        document.getElementById('advice-content').innerHTML = "<b>คำแนะนำ:</b> จากค่า BMI ของคุณ ควรเน้นสารอาหารที่สมดุล โดยแบ่งสัดส่วนโปรตีนให้เพียงพอต่อการซ่อมแซมร่างกายครับ";
    }

    function previewImage(input) {
        const reader = new FileReader();
        reader.onload = (e) => document.getElementById('avatar-preview').src = e.target.result;
        reader.readAsDataURL(input.files[0]);
    }

    function logout() { location.reload(); }
    function toggleAuthMode() { 
        let title = document.getElementById('auth-title');
        title.innerText = title.innerText === "เข้าสู่ระบบ" ? "สมัครสมาชิก" : "เข้าสู่ระบบ";
    }
</script>
</body>
</html>
