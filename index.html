<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกและคำนวณ BMI รายวัน</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }

        h2, h3 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #0056b3;
        }

        .switch-text {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }

        .switch-text a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }

        /* ตารางแสดงประวัติ */
        .table-responsive {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            white-space: nowrap;
        }

        th {
            background-color: #f8f9fa;
            color: #333;
        }

        .user-info {
            background: #e9ecef;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }

        .badge {
            background: #28a745;
            color: white;
            padding: 3px 8px;
            border-radius: 3px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-box">
            <h2>เข้าสู่ระบบ</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>ชื่อผู้ใช้</label>
                    <input type="text" id="login-username" required placeholder="กรอกชื่อผู้ใช้">
                </div>
                <div class="form-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" id="login-password" required placeholder="กรอกรหัสผ่าน">
                </div>
                <button type="submit">เข้าสู่ระบบ</button>
            </form>
            <div class="switch-text">
                ยังไม่มีบัญชีใช่ไหม? <a href="#" id="to-register">สร้างบัญชีผู้ใช้</a>
            </div>
        </div>

        <div id="register-box" class="hidden">
            <h2>สร้างบัญชีผู้ใช้ใหม่</h2>
            <form id="register-form">
                <div class="form-group">
                    <label>ชื่อผู้ใช้</label>
                    <input type="text" id="reg-username" required placeholder="ตั้งชื่อผู้ใช้">
                </div>
                <div class="form-group">
                    <label>รหัสผ่าน (อย่างน้อย 8 ตัวอักษร)</label>
                    <input type="password" id="reg-password" minlength="8" required placeholder="ตั้งรหัสผ่าน">
                </div>
                <button type="submit">สมัครสมาชิก</button>
            </form>
            <div class="switch-text">
                มีบัญชีอยู่แล้ว? <a href="#" id="to-login">เข้าสู่ระบบที่นี่</a>
            </div>
        </div>

        <div id="main-dashboard" class="hidden">
            <h2>บันทึกข้อมูลสุขภาพรายวัน</h2>
            <div class="user-info" id="welcome-msg">สวัสดีคุณ </div>
            
            <form id="bmi-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>วันที่บันทึก</label>
                        <input type="date" id="health-date" required>
                    </div>
                    <div class="form-group">
                        <label>เพศ</label>
                        <select id="health-gender" required>
                            <option value="">เลือกเพศ</option>
                            <option value="ชาย">ชาย</option>
                            <option value="หญิง">หญิง</option>
                            <option value="อื่นๆ">อื่นๆ</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>ปีเกิด (ค.ศ.) เช่น 1995</label>
                        <input type="number" id="health-birthyear" min="1900" max="2026" required placeholder="ค.ศ. เกิด">
                    </div>
                    <div class="form-group">
                        <label>น้ำหนัก (กิโลกรัม)</label>
                        <input type="number" id="health-weight" step="0.1" min="1" required placeholder="เช่น 65.5">
                    </div>
                    <div class="form-group">
                        <label>ส่วนสูง (เซนติเมตร)</label>
                        <input type="number" id="health-height" step="0.1" min="1" required placeholder="เช่น 170">
                    </div>
                </div>

                <button type="submit" style="background: #28a745;">คำนวณและบันทึกค่าวัดอัตโนมัติ</button>
            </form>

            <hr style="margin: 25px 0; border: 0; border-top: 1px solid #ccc;">

            <h3>ประวัติการประเมิน BMI ของคุณ</h3>
            <div class="table-responsive">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>วันที่</th>
                            <th>เพศ</th>
                            <th>อายุ</th>
                            <th>น้ำหนัก (กก.)</th>
                            <th>ส่วนสูง (ซม.)</th>
                            <th>ค่า BMI</th>
                        </tr>
                    </thead>
                    <tbody id="history-list">
                        </tbody>
                </table>
            </div>
            
            <button id="logout-btn" style="background: #dc3545; margin-top: 20px;">ออกจากระบบ</button>
        </div>
    </div>

    <script>
        const loginBox = document.getElementById('login-box');
        const registerBox = document.getElementById('register-box');
        const mainDashboard = document.getElementById('main-dashboard');
        
        let currentUser = ""; 

        // ตั้งวันที่ปัจจุบันเป็นค่าเริ่มต้น
        document.getElementById('health-date').valueAsDate = new Date();

        // สลับหน้าจอ
        document.getElementById('to-register').addEventListener('click', (e) => { e.preventDefault(); loginBox.classList.add('hidden'); registerBox.classList.remove('hidden'); });
        document.getElementById('to-login').addEventListener('click', (e) => { e.preventDefault(); registerBox.classList.add('hidden'); loginBox.classList.remove('hidden'); });

        // สมัครสมาชิก
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            localStorage.setItem('user_' + username, password);
            alert('สร้างบัญชีผู้ใช้สำเร็จแล้ว!');
            document.getElementById('register-form').reset();
            registerBox.classList.add('hidden');
            loginBox.classList.remove('hidden');
        });

        // เข้าสู่ระบบ
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const savedPassword = localStorage.getItem('user_' + username);

            if (savedPassword && savedPassword === password) {
                currentUser = username;
                document.getElementById('welcome-msg').innerText = `สวัสดีคุณ: ${currentUser}`;
                
                loginBox.classList.add('hidden');
                mainDashboard.classList.remove('hidden');
                
                displayHistory(); // แสดงประวัติเก่าของคนที่ล็อกอิน
            } else {
                alert('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
            }
        });

        // ระบบคำนวณและบันทึกข้อมูลอัตโนมัติ
        document.getElementById('bmi-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const date = document.getElementById('health-date').value;
            const gender = document.getElementById('health-gender').value;
            const birthYear = parseInt(document.getElementById('health-birthyear').value);
            const weight = parseFloat(document.getElementById('health-weight').value);
            const height = parseFloat(document.getElementById('health-height').value);

            // 1. คำนวณอายุอัตโนมัติ (อิงปีปัจจุบัน ค.ศ. 2026)
            const currentYear = new Date().getFullYear();
            const age = currentYear - birthYear;

            // 2. คำนวณ BMI อัตโนมัติ (น้ำหนัก / ส่วนสูงเมตรยกกำลังสอง)
            const heightInMeters = height / 100;
            const bmi = (weight / (heightInMeters * heightInMeters)).toFixed(1);

            // 3. บันทึกลง LocalStorage
            let history = JSON.parse(localStorage.getItem('health_history_' + currentUser)) || [];
            history.push({ date, gender, age, weight, height, bmi });
            
            // เรียงวันที่ล่าสุดอยู่ล่าง หรือเรียงจากเก่าไปใหม่
            history.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('health_history_' + currentUser, JSON.stringify(history));

            alert(`คำนวณเสร็จสิ้น! ค่า BMI ของคุณคือ ${bmi} ระบบบันทึกข้อมูลให้เรียบร้อยแล้ว`);
            
            // ล้างฟอร์มน้ำหนักส่วนสูง (เก็บเพศกับปีเกิดไว้เผื่อกรอกวันถัดไปจะได้ไม่ต้องพิมพ์ใหม่หมด)
            document.getElementById('health-weight').value = "";
            document.getElementById('health-height').value = "";
            
            displayHistory(); // รีเฟรชตาราง
        });

        // ดึงประวัติมาแสดง
        function displayHistory() {
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = ""; 

            let history = JSON.parse(localStorage.getItem('health_history_' + currentUser)) || [];

            if (history.length === 0) {
                historyList.innerHTML = `<tr><td colspan="6" style="color:#888;">ยังไม่มีประวัติการบันทึกข้อมูลสุขภาพ</td></tr>`;
                return;
            }

            history.forEach(item => {
                const row = `<tr>
                    <td>${item.date}</td>
                    <td>${item.gender}</td>
                    <td>${item.age} ปี</td>
                    <td>${item.weight}</td>
                    <td>${item.height}</td>
                    <td><span class="badge">${item.bmi}</span></td>
                </tr>`;
                historyList.innerHTML += row;
            });
        }

        // ออกจากระบบ
        document.getElementById('logout-btn').addEventListener('click', () => {
            currentUser = "";
            document.getElementById('login-form').reset();
            document.getElementById('bmi-form').reset();
            document.getElementById('health-date').valueAsDate = new Date();
            mainDashboard.classList.add('hidden');
            loginBox.classList.remove('hidden');
        });
    </script>
</body>
</html>
